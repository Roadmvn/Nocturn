server {
    listen 80;
    server_name nocturn.roadmvn.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nocturn.roadmvn.com;

    ssl_certificate /etc/letsencrypt/live/nocturn.roadmvn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nocturn.roadmvn.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend React (build statique)
    root /opt/Nocturn/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Flask controller (port 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}

# Port 1234 : agents se connectent directement (HTTPS Flask)
# Le firewall doit ouvrir ce port : ufw allow 1234
